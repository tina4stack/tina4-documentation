name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Audit internal links
        run: python3 scripts/audit-links.py --strict --strict-anchors
        # Both flags on: gates the merge on missing files, missing images,
        # AND stale anchors. Anchor count is 0 across the docs as of the
        # cross-book sync rewriter landing — tightening here so any new
        # broken anchor blocks the build before it reaches main.
